<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | NMO Helper</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" sizes="48x48" href="/cat.png">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 40%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-glow::before, .bg-glow::after { content: ''; position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 15s ease-in-out infinite; }
        .bg-glow::before { width: 600px; height: 600px; background: #667eea; top: -200px; left: -100px; }
        .bg-glow::after { width: 500px; height: 500px; background: #f093fb; bottom: -150px; right: -100px; animation-delay: -7s; }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 20px) scale(0.95); }
        }
        .content { position: relative; z-index: 1; }
        .error-code {
            font-size: clamp(6rem, 20vw, 10rem); font-weight: 800; line-height: 1;
            background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #f093fb 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .message { font-size: 1.2rem; color: rgba(255, 255, 255, 0.7); margin: 16px 0 32px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 12px;
            font-size: 1rem; font-weight: 600; text-decoration: none; transition: all 0.3s ease;
            background: linear-gradient(135deg, #667eea, #764ba2); color: #fff;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(102, 126, 234, 0.6); }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="content">
        <h1 class="error-code">404</h1>
        <p class="message">Такой страницы не существует, но NMO Helper всё ещё работает!</p>
        <a href="/" class="btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            На главную
        </a>
    </div>
</body>
</html>
