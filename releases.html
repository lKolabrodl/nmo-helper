    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        .bg-glow { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .bg-glow::before, .bg-glow::after { content: ''; position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.3; animation: float 15s ease-in-out infinite; }
        .bg-glow::before { width: 600px; height: 600px; background: var(--gradient-1); top: -200px; left: -100px; }
        .bg-glow::after { width: 500px; height: 500px; background: var(--gradient-3); bottom: -150px; right: -100px; animation-delay: -7s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }

    <script>
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        function stripEmoji(text) {
            return text.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{1FA00}-\u{1FA6F}\u{1FA70}-\u{1FAFF}\u{200D}\u{20E3}\u{E0020}-\u{E007F}]/gu, '').replace(/ {2,}/g, ' ');
        }

        function parseMarkdown(text) {
            if (!text) return '';
            text = text.replace(/\r\n/g, '\n');
            text = text.replace(/\n---[\s\S]*$/m, '');

            // Promote standalone section titles (e.g. "Возможности") to ### headings
            text = text.replace(/^(Возможности|Особенности|Изменения)$/gm, '### $1');

            // Remove install sections (### Установка..., Установка\n..., numbered install steps)
            text = text.replace(/^#{1,3}\s*Установка[^\n]*(?:\n(?!##).*)*$/gm, '');
            text = text.replace(/^Установка\n(?:(?!##)[^\n]*\n?)*/gm, '');
            text = text.replace(/^(?:Скачайте или клонируйте|Откройте chrome|Включите «Режим|Нажмите «Загрузить|Выберите папку)[^\n]*$/gm, '');
            text = text.replace(/^\d+\.\s+(?:Скачайте|Перетащите файл)[^\n]*$/gm, '');
            text = text.replace(/\n{3,}/g, '\n\n');

            // Convert emoji-prefixed lines to list items
            text = text.replace(/^[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]\s*/gmu, '- ');

            text = stripEmoji(text);

            // If no ## headings, promote first line to h2
            if (!text.match(/^##/m)) {
                var firstLine = text.split('\n')[0].trim();
                if (firstLine && !firstLine.startsWith('-')) {
                    // Strip version prefix like "v2.0.0: " or "NMO Helper v1.4.2"
                    firstLine = firstLine.replace(/^(NMO Helper\s+)?v[\d.]+[:\s]*/i, '').trim();
                    if (firstLine) {
                        text = '## ' + firstLine + text.substring(text.indexOf('\n'));
                    } else {
                        text = '## Описание' + text.substring(text.indexOf('\n'));
                    }
                }
            }

            var html = '';
            var lines = text.split('\n');
            var inList = false;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) {
                    if (inList) { html += '</ul>'; inList = false; }
                    continue;
                }

                // Headings
                if (line.match(/^### (.+)/)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h3>' + formatInline(line.replace(/^### /, '')) + '</h3>';
                } else if (line.match(/^## (.+)/)) {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<h2>' + formatInline(line.replace(/^## /, '')) + '</h2>';
                }
                // List items
                else if (line.match(/^[-*] (.+)/)) {
                    if (!inList) { html += '<ul>'; inList = true; }
                    html += '<li>' + formatInline(line.replace(/^[-*] /, '')) + '</li>';
                }
                // Regular text
                else {
                    if (inList) { html += '</ul>'; inList = false; }
                    html += '<p>' + formatInline(line) + '</p>';
                }
            }
            if (inList) html += '</ul>';
            return html;
        }

        function formatInline(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`(.+?)`/g, '<code>$1</code>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:var(--gradient-1)">$1</a>');
        }

        function getAssetIcon(name) {
            if (name.endsWith('.zip')) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
            if (name.endsWith('.xpi')) return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
            return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>';
        }

        function getAssetLabel(name) {
            if (name.endsWith('.zip')) return 'Chrome';
            if (name.endsWith('.xpi')) return 'Firefox';
            return name;
        }

        async function loadReleases() {
            const container = document.getElementById('releases');
            const loading = document.getElementById('loading');

            try {
                const resp = await fetch('https://api.github.com/repos/lKolabrodl/nmo-helper/releases');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const releases = await resp.json();

                loading.remove();

                if (releases.length === 0) {
                    container.innerHTML = '<div class="error-msg">Релизов пока нет.</div>';
                    return;
                }

                releases.forEach(function(release, idx) {
                    var card = document.createElement('div');
                    card.className = 'release-card fade-in' + (idx === 0 ? ' latest' : '');

                    var badges = '';
                    if (idx === 0) badges += '<span class="badge latest">Последняя</span>';
                    if (release.prerelease) badges += '<span class="badge pre">Pre-release</span>';

                    var assets = '';
                    if (release.assets && release.assets.length > 0) {
                        assets = '<div class="release-assets">';
                        release.assets.forEach(function(a) {
                            assets += '<a href="' + a.browser_download_url + '" class="asset-btn">' +
                                getAssetIcon(a.name) +
                                getAssetLabel(a.name) +
                                ' <span class="asset-size">(' + formatSize(a.size) + ')</span></a>';
                        });
                        assets += '</div>';
                    }

                    var installLink = '<p style="margin-top:16px"><strong><a href="/instruction" style="color:var(--gradient-1)">Установка &rarr;</a></strong></p>';

                    card.innerHTML =
                        '<div class="release-header">' +
                            '<span class="release-version">' + release.tag_name + '</span>' +
                            badges +
                            '<span class="release-date">' + formatDate(release.published_at) + '</span>' +
                        '</div>' +
                        (release.body ? '<div class="release-body">' + parseMarkdown(release.body) + installLink + '</div>' : '') +
                        assets;

                    container.appendChild(card);
                });

                // Fade-in animation
                var observer = new IntersectionObserver(function(entries) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) entry.target.classList.add('visible');
                    });
                }, { threshold: 0.1 });
                document.querySelectorAll('.fade-in').forEach(function(el) { observer.observe(el); });

            } catch (err) {
                loading.remove();
                container.innerHTML = '<div class="error-msg">Не удалось загрузить релизы. Попробуйте позже или посмотрите на <a href="https://github.com/lKolabrodl/nmo-helper/releases" target="_blank" style="color:var(--gradient-1)">GitHub</a>.</div>';
            }
        }

        loadReleases();
    </script>
